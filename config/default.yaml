# KUBER — Default Configuration
# Override any setting via environment variables or a custom YAML file.

project:
  name: "KUBER"
  version: "0.1.0"

data:
  cache_dir: ".cache"
  default_start: "2020-01-01"
  default_end: "2026-03-27"
  frequency: "daily"               # daily, weekly, monthly
  max_missing_pct: 0.05            # drop tickers with >5% missing days
  forward_fill_limit: 2            # forward-fill gaps up to N days

  price:
    source: "yfinance"
    cache_subdir: "prices"

  macro:
    source: "fred"
    cache_subdir: "macro"
    default_indicators:
      - GS10        # 10Y Treasury Yield
      - GS2         # 2Y Treasury Yield
      - VIXCLS      # VIX
      - UNRATE      # Unemployment Rate
      - CPIAUCSL    # CPI
      - FEDFUNDS    # Fed Funds Rate
      - T10Y2Y      # 10Y-2Y Spread

  sentiment:
    provider: "synthetic"          # synthetic, finbert, claude
    cache_subdir: "sentiment"
    synthetic_noise_std: 0.3       # noise added to synthetic sentiment
    synthetic_correlation: 0.15    # target correlation with forward returns

universe:
  default: "balanced_etf"

signals:
  momentum:
    lookback_long: 252             # ~12 months
    lookback_short: 21             # ~1 month
  mean_reversion:
    rsi_period: 14
    bollinger_period: 20
    bollinger_std: 2.0
    zscore_window: 60
  volatility:
    realized_window: 21
    garch_order: [1, 1]
  sentiment:
    smoothing_window: 5
  macro:
    vix_lookback: 252

composite:
  default_weights:
    momentum: 0.30
    mean_reversion: 0.20
    volatility: 0.15
    sentiment: 0.15
    macro: 0.20

regime:
  method: "hmm"                    # hmm, vix_rule
  n_regimes: 3
  hmm:
    n_iter: 100
    covariance_type: "full"
  vix_thresholds:
    bull: 15
    bear: 25

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
